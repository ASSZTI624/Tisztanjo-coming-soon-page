<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hamarosan jövünk | tisztan-jo.hu</title>
    <style>
        body, html {
            height: 100%;
            margin: 0;
            /* Modern system fonts */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            /* Smooth gradient background */
            background: linear-gradient(135deg, #2b5876 0%, #4e4376 100%);
            color: white;
            /* Flexbox to center everything vertically and horizontally */
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
        .container {
            padding: 20px;
        }
        h1 {
            /* Very large letters */
            font-size: 5rem;
            margin: 0;
            text-shadow: 2px 4px 6px rgba(0,0,0,0.3);
        }
        p {
            font-size: 1.5rem;
            margin-top: 20px;
            font-weight: 300;
            opacity: 0.9;
        }
        
        /* Mobile responsiveness */
        @media (max-width: 600px) {
            h1 { font-size: 3rem; }
            p { font-size: 1.2rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Hamarosan jövünk!</h1>
        <p>A weboldal fejlesztés alatt áll. Kérjük, látogass vissza később.</p>
    </div>
</body>
</html>
